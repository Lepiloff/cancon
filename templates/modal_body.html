{% load i18n %}
{% if links %}
    {% for link in links %}
        <a href="{{ link.url }}" class="search-dropdown__result-link">{{ link.name }}</a>
    {% endfor %}
{% else %}
    <p class="search-dropdown__no-results">{% trans "No se encontraron variedades que coincidan con tu búsqueda." %}</p>
{% endif %}
